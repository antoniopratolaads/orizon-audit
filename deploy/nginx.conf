server {
    listen 80 default_server;
    server_name _;

    # Request/body limits — audit uploads can be large (GAds 23-tab XLSX)
    client_max_body_size 50M;
    proxy_read_timeout 600s;   # Claude generation up to ~5 min
    proxy_send_timeout 600s;
    proxy_buffering off;        # keep SSE events (generate endpoint) streaming
    proxy_cache off;

    # Basic auth (htpasswd file is mounted read-only)
    auth_basic "ORIZON Audit Suite";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
